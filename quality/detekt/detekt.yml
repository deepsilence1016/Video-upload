# Vision Agent — Detekt Configuration
# Compatible with Detekt 1.23.x
# https://detekt.dev/docs/introduction/configurations

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false     # Changed: true causes failure on unknown keys across versions

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

# ── Rule Sets ────────────────────────────────────────────────

comments:
  active: true
  CommentOverPrivateFunction:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 4
  ComplexInterface:
    active: true
    threshold: 10
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 8
  NestedBlockDepth:
    active: true
    threshold: 5
  TooManyFunctions:
    active: true
    thresholdInFiles: 30
    thresholdInClasses: 20

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|(ignored)|(expected)'
  EmptyFinallyBlock:
    active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

exceptions:
  active: true
  InstanceOfCheckForException:
    active: true
  NotImplementedDeclaration:
    active: true
  PrintStackTrace:
    active: true
  RethrowCaughtException:
    active: true
  ReturnFromFinally:
    active: true
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Error
      - Exception
      - RuntimeException
      - Throwable
    allowedExceptionNameRegex: '^(_|(ignored)|(expected))$'
  TooGenericExceptionThrown:
    active: true

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
  ConstantNaming:
    active: true
    # FIX: In Detekt 1.23+, constantPattern replaces constantNamingPattern
    constantPattern: '[A-Z][_A-Z0-9]*'
  MemberNameEqualsClassName:
    active: true

performance:
  active: true
  ArrayPrimitive:
    active: true
  ForEachOnRange:
    active: true
  SpreadOperator:
    active: true
    # FIX: In Detekt 1.23+, excludedFunctions takes a List, not comma-string
    excludedFunctions:
      - arrayOf
      - intArrayOf
      - floatArrayOf
  UnnecessaryTemporaryInstantiation:
    active: true

potential-bugs:
  active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
  IteratorHasNextCallsNextMethod:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true
  NullableToStringCall:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true
  UnreachableCode:
    active: true

style:
  active: true
  ForbiddenComment:
    active: true
    # FIX: In Detekt 1.23+, values is a List of strings (not objects with reason/value)
    values:
      - 'TODO:'
      - 'FIXME:'
      - 'HACK:'
    # comments field replaces deprecated reason field
    comments: 'Use the issue tracker instead of inline TODO/FIXME/HACK comments'
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '100'
      - '1000'
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
  NoTabs:
    active: true
  ReturnCount:
    active: true
    max: 3
  ThrowsCount:
    active: true
    max: 3
  UnusedPrivateMember:
    active: true
  WildcardImport:
    active: true
